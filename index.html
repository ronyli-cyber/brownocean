<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blunt Ocean - Ultra Deep</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --dim: #94a3b8; --success: #22c55e; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; line-height: 1.6; }
        .container { max-width: 500px; width: 100%; background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); text-align: center; }
        .control-group { margin: 25px 0; text-align: left; }
        label { font-size: 0.85rem; color: var(--dim); margin-bottom: 8px; display: block; font-weight: 600; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; margin-top: 10px; transition: transform 0.1s; }
        #playBtn { background: var(--accent); color: var(--bg); font-size: 1rem; }
        #downloadBtn { background: transparent; border: 2px solid var(--success); color: var(--success); margin-top: 15px; font-size: 0.85rem; }
        .about-box { max-width: 500px; margin-top: 40px; padding: 20px; border-top: 1px solid #334155; text-align: left; }
        h2 { font-size: 1.1rem; color: var(--text); margin-bottom: 10px; }
        p { font-size: 0.9rem; color: var(--dim); margin: 0; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="margin-bottom: 25px;">Blunt Ocean Generator</h2>
        
        <div class="control-group">
            <label>Softness (Deep Heavy <—> Gentle Wind)</label>
            <input type="range" id="softnessSlider" min="100" max="900" value="350">
        </div>

        <div class="control-group">
            <label>Wave Rhythm (Static <—> Deep Tidal Breathing)</label>
            <input type="range" id="speedSlider" min="0" max="0.25" step="0.005" value="0.1">
        </div>

        <button id="playBtn" class="btn">START OCEAN</button>
        <button id="downloadBtn" class="btn">DOWNLOAD 10-CYCLE PRO LOOP</button>
    </div>

    <div class="about-box">
        <h2>Deep Sleep Shield</h2>
        <p>This version uses <b>Linear Gain Smoothing</b> to eliminate percussive "thumps" and caps the filter at 900Hz to ensure the signal remains heavy and non-intrusive.</p>
    </div>

    <script>
        let audioCtx, biquadFilter, swellGain, masterGain, noiseSource, isPlaying = false, audioBuffer;

        function initAudio() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            const bufferSize = 2 * audioCtx.sampleRate;
            audioBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = audioBuffer.getChannelData(0);
            let lastOut = 0.0;
            
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                output[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = output[i];
                output[i] *= 3.5; 
            }

            noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = audioBuffer;
            noiseSource.loop = true;

            biquadFilter = audioCtx.createBiquadFilter();
            biquadFilter.type = "lowpass";
            biquadFilter.frequency.value = document.getElementById('softnessSlider').value;

            swellGain = audioCtx.createGain();
            swellGain.gain.value = 0.5;

            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.8;

            noiseSource.connect(biquadFilter);
            biquadFilter.connect(swellGain);
            swellGain.connect(masterGain);
            masterGain.connect(audioCtx.destination);

            noiseSource.start(0);
        }

        function updateTide() {
            if (!isPlaying || !audioCtx) return;
            const now = audioCtx.currentTime;
            const speed = parseFloat(document.getElementById('speedSlider').value);

            swellGain.gain.cancelScheduledValues(now);

            if (speed <= 0.01) {
                swellGain.gain.setTargetAtTime(0.7, now, 0.3);
            } else {
                const period = 1 / speed;
                swellGain.gain.setValueAtTime(swellGain.gain.value, now);
                
                // FIXED: Using linearRampToValueAtTime to stop the percussive "heartbeat"
                // Peak Inhale (0.9)
                swellGain.gain.linearRampToValueAtTime(0.9, now + (period * 0.4));
                // Gentle Recede to 0.25 (higher floor for less "thump")
                swellGain.gain.setTargetAtTime(0.25, now + (period * 0.4), period * 0.2);
            }
            
            setTimeout(updateTide, 1200);
        }

        document.getElementById('playBtn').onclick = async () => {
            if (!audioCtx) initAudio();

            if (!isPlaying) {
                await audioCtx.resume();
                isPlaying = true;
                document.getElementById('playBtn').innerText = "STOP OCEAN";
                updateTide();
            } else {
                await audioCtx.suspend();
                isPlaying = false;
                document.getElementById('playBtn').innerText = "START OCEAN";
            }
        };

        document.getElementById('softnessSlider').oninput = (e) => {
            if (isPlaying && biquadFilter) {
                biquadFilter.frequency.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.1);
            }
        };

        document.getElementById('speedSlider').oninput = () => {
            if (isPlaying) updateTide();
        };

        // --- WAV EXPORT ---
        document.getElementById('downloadBtn').onclick = async () => {
            if (!isPlaying) { alert("Please start the signal first."); return; }
            const waveSpeed = parseFloat(document.getElementById('speedSlider').value);
            const cycleDuration = waveSpeed > 0 ? (1 / waveSpeed) : 8;
            const totalDuration = cycleDuration * 10;
            
            const btn = document.getElementById('downloadBtn');
            btn.innerText = "ENCODING...";
            btn.disabled = true;

            const sr = 44100;
            const offCtx = new OfflineAudioContext(1, sr * totalDuration, sr);
            
            const src = offCtx.createBufferSource();
            src.buffer = audioBuffer; src.loop = true;
            const fil = offCtx.createBiquadFilter();
            fil.type = "lowpass"; fil.frequency.value = biquadFilter.frequency.value;
            const g = offCtx.createGain();
            
            g.gain.setValueAtTime(0.5, 0);
            for(let i=0; i<10; i++) {
                let st = i * cycleDuration;
                if(waveSpeed > 0) {
                    g.gain.linearRampToValueAtTime(0.9, st + (cycleDuration * 0.4));
                    g.gain.linearRampToValueAtTime(0.25, st + (cycleDuration * 0.9));
                    g.gain.linearRampToValueAtTime(0.25, st + cycleDuration);
                } else {
                    g.gain.setValueAtTime(0.7, st);
                }
            }

            src.connect(fil); fil.connect(g); g.connect(offCtx.destination);
            src.start();
            const rendered = await offCtx.startRendering();
            const blob = bufferToWav(rendered, rendered.length);
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `BluntOcean_Recalibrated.wav`;
            a.click();
            btn.innerText = "DOWNLOAD PRO LOOP";
            btn.disabled = false;
        };

        function bufferToWav(abuffer, len) {
            let numOfChan = 1, length = len * 2 + 44, buffer = new ArrayBuffer(length), view = new DataView(buffer), pos = 0;
            const setUint32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
            const setUint16 = (d) => { view.setUint16(pos, d, true); pos += 2; };
            setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
            setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(1);
            setUint32(abuffer.sampleRate); setUint32(abuffer.sampleRate * 2); setUint16(2); setUint16(16);
            setUint32(0x61746164); setUint32(length - pos - 4);
            const data = abuffer.getChannelData(0);
            for(let i=0; i<len; i++) {
                let s = Math.max(-1, Math.min(1, data[i]));
                view.setInt16(pos, s < 0 ? s * 32768 : s * 32767, true); pos += 2;
            }
            return new Blob([buffer], {type: "audio/wav"});
        }
    </script>
</body>
</html>
