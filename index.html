<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blunt Ocean - Deep Tidal Shield</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --dim: #94a3b8; --success: #22c55e; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; line-height: 1.6; }
        .container { max-width: 500px; width: 100%; background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); text-align: center; }
        .control-group { margin: 25px 0; text-align: left; }
        label { font-size: 0.85rem; color: var(--dim); margin-bottom: 8px; display: block; font-weight: 600; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; margin-top: 10px; transition: transform 0.1s; }
        #playBtn { background: var(--accent); color: var(--bg); font-size: 1rem; }
        #downloadBtn { background: transparent; border: 2px solid var(--success); color: var(--success); margin-top: 15px; font-size: 0.85rem; }
        .about-box { max-width: 500px; margin-top: 40px; padding: 20px; border-top: 1px solid #334155; text-align: left; }
        h2 { font-size: 1.1rem; color: var(--text); margin-bottom: 10px; }
        p { font-size: 0.9rem; color: var(--dim); margin: 0; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="margin-bottom: 25px;">Blunt Ocean Generator</h2>
        
        <div class="control-group">
            <label>Softness (Deep Bass <—> Crisp Wind)</label>
            <input type="range" id="softnessSlider" min="100" max="1500" value="350">
        </div>

        <div class="control-group">
            <label>Wave Rhythm (Static <—> Deep Tidal Breathing)</label>
            <input type="range" id="speedSlider" min="0" max="0.25" step="0.005" value="0.1">
        </div>

        <button id="playBtn" class="btn">START OCEAN</button>
        <button id="downloadBtn" class="btn">DOWNLOAD 10-CYCLE PRO LOOP</button>
    </div>

    <div class="about-box">
        <h2>Deep Sleep Shield</h2>
        <p>Calibrated for heavy brown noise masking. The wave rhythm uses an asymmetrical 30/70 inhale-exhale ratio to mimic natural tidal physics.</p>
    </div>

    <script>
        function updateTide() {
    if (!isPlaying || !audioCtx) return;
    const now = audioCtx.currentTime;
    const speed = parseFloat(document.getElementById('speedSlider').value);

    // Cancel previous schedules to prevent "stacking" sounds
    swellGain.gain.cancelScheduledValues(now);

    if (speed <= 0.01) {
        swellGain.gain.setTargetAtTime(0.7, now, 0.3);
    } else {
        const period = 1 / speed;
        
        // Start from current value to avoid a "jump" or "click"
        swellGain.gain.setValueAtTime(swellGain.gain.value, now);
        
        // INHALE: Linear ramp is much smoother for low frequencies than exponential
        // It reaches the peak at 40% of the cycle
        swellGain.gain.linearRampToValueAtTime(0.9, now + (period * 0.4));
        
        // EXHALE: Slower recession to a slightly higher floor (0.25)
        // This removes the "void" that sounds like a beat
        swellGain.gain.setTargetAtTime(0.25, now + (period * 0.4), period * 0.3);
    }
    
    // Check for updates every 1.5 seconds
    setTimeout(updateTide, 1500);
}
    </script>
</body>
</html>
