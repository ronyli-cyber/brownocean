<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Sound Suite v5</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --dim: #94a3b8; --success: #22c55e; --rain: #60a5fa; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        .container { max-width: 500px; width: 100%; background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); text-align: center; }
        .zone-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 30px; }
        .zone-btn { background: #334155; border: 2px solid transparent; border-radius: 12px; padding: 15px 5px; cursor: pointer; color: var(--dim); display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.2s; }
        .zone-btn.active { border-color: var(--accent); color: var(--accent); background: #1e293b; }
        .zone-btn svg { width: 24px; height: 24px; fill: currentColor; }
        .control-group { margin: 20px 0; text-align: left; }
        label { font-size: 0.85rem; color: var(--dim); margin-bottom: 8px; display: block; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        #rainSlider { accent-color: var(--rain); }
        .btn { width: 100%; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; margin-top: 10px; transition: 0.1s; }
        .btn:active { transform: scale(0.98); }
        #playBtn { background: var(--accent); color: var(--bg); }
        #downloadBtn { background: transparent; border: 2px solid var(--success); color: var(--success); margin-top: 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="zone-selector">
            <button class="zone-btn active" onclick="setZone('sleep', this)">
                <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
                <span>Ocean</span>
            </button>
            <button class="zone-btn" onclick="setZone('creek', this)">
                <svg viewBox="0 0 24 24"><path d="M10 2v2h4V2h-4zm3 16.18V11h-2v7.18c-1.15.28-2 .72-2 1.32 0 1.1 1.79 2 4 2s4-.9 4-2c0-.6-.85-1.04-2-1.32z"/></svg>
                <span>Creek</span>
            </button>
            <button class="zone-btn" onclick="setZone('work', this)">
                <svg viewBox="0 0 24 24"><path d="M12 22c5.52 0 10-4.48 10-10S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10z"/></svg>
                <span>Leaves</span>
            </button>
            <button class="zone-btn" onclick="setZone('active', this)">
                <svg viewBox="0 0 24 24"><path d="M19 7l-2 6h-4l3-9-8 8h3l-2 6h5l2-11z"/></svg>
                <span>Gallop</span>
            </button>
        </div>

        <div class="control-group">
            <label>Sound Softness (Tone)</label>
            <input type="range" id="softnessSlider" min="100" max="2500" value="400">
        </div>

        <div class="control-group">
            <label>Intensity (Swell/Rhythm)</label>
            <input type="range" id="speedSlider" min="0" max="1.0" step="0.01" value="0.12">
        </div>

        <div class="control-group">
            <label style="color: var(--rain);">Rain Patter (Texture)</label>
            <input type="range" id="rainSlider" min="0" max="1.0" step="0.01" value="0">
        </div>

        <button id="playBtn" class="btn">START NATURE</button>
        <button id="downloadBtn" class="btn">DOWNLOAD 10-CYCLE PRO LOOP</button>
    </div>

    <script>
        let audioCtx, masterGain, isPlaying = false;
        let noiseNode, filterNode, swellNode, rainGain;
        let currentZone = 'sleep';
        let birdTimer, gallopTimer, bubbleTimer;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.6;
            masterGain.connect(audioCtx.destination);
            startEngine();
        }

        function startEngine() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

            // Main Engine (Ocean/Wind/Creek Base)
            noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = buffer;
            noiseNode.loop = true;
            filterNode = audioCtx.createBiquadFilter();
            filterNode.type = (currentZone === 'creek') ? 'bandpass' : 'lowpass';
            filterNode.Q.value = (currentZone === 'creek') ? 1.5 : 0.7;
            filterNode.frequency.value = document.getElementById('softnessSlider').value;
            swellNode = audioCtx.createGain();
            
            // Rain Engine (High-passed White Noise)
            const rainSource = audioCtx.createBufferSource();
            rainSource.buffer = buffer;
            rainSource.loop = true;
            const rainFilter = audioCtx.createBiquadFilter();
            rainFilter.type = "highpass";
            rainFilter.frequency.value = 3000; // Keep rain thin and shimmering
            rainGain = audioCtx.createGain();
            rainGain.gain.value = document.getElementById('rainSlider').value * 0.15;

            // Connections
            noiseNode.connect(filterNode);
            filterNode.connect(swellNode);
            swellNode.connect(masterGain);
            
            rainSource.connect(rainFilter);
            rainFilter.connect(rainGain);
            rainGain.connect(masterGain);

            noiseNode.start();
            rainSource.start();
            scheduleAutomation();
        }

        function scheduleAutomation() {
            if (!isPlaying) return;
            const now = audioCtx.currentTime;
            const speed = parseFloat(document.getElementById('speedSlider').value);

                const period = 1 / speed;
                swellNode.gain.cancelScheduledValues(now);
                if (currentZone !== 'active') {
