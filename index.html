<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functional Sound Suite</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --dim: #94a3b8;
            --success: #22c55e;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
        }

        .zone-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .zone-btn {
            background: #334155;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 15px 5px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--dim);
        }

        .zone-btn svg { width: 24px; height: 24px; fill: currentColor; }
        .zone-btn span { font-size: 0.75rem; font-weight: 600; }
        .zone-btn.active { border-color: var(--accent); color: var(--accent); background: #1e293b; }

        .control-group { margin: 20px 0; text-align: left; }
        label { font-size: 0.85rem; color: var(--dim); margin-bottom: 8px; display: block; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            margin-top: 10px;
            transition: transform 0.1s;
        }

        #playBtn { background: var(--accent); color: var(--bg); }
        #downloadBtn { background: transparent; border: 2px solid var(--success); color: var(--success); margin-top: 15px; }
        #downloadBtn:disabled { opacity: 0.3; cursor: wait; }

        .about-box {
            max-width: 500px;
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid #334155;
        }

        h2 { font-size: 1.1rem; color: var(--text); margin-top: 0; }
        #aboutContent { font-size: 0.9rem; color: var(--dim); }
        .badge { font-size: 0.7rem; color: #475569; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="zone-selector">
            <button class="zone-btn active" onclick="setZone('sleep', this)">
                <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
                <span>Sleep</span>
            </button>
            <button class="zone-btn" onclick="setZone('focus', this)">
                <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg>
                <span>Focus</span>
            </button>
            <button class="zone-btn" onclick="setZone('work', this)">
                <svg viewBox="0 0 24 24"><path d="M14 6V4h-4v2h4zM4 8v11h16V8H4zm18-2v15H2V6h5V4c0-1.1.9-2 2-2h6c1.1 0 2 .9 2 2v2h5z"/></svg>
                <span>Work</span>
            </button>
            <button class="zone-btn" onclick="setZone('active', this)">
                <svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
                <span>Active</span>
            </button>
        </div>

        <div class="control-group">
            <label id="softLabel">Softness (Low-Pass Filter)</label>
            <input type="range" id="softnessSlider" min="100" max="1500" value="350">
        </div>

        <div class="control-group">
            <label>Wave Intensity / Rhythm</label>
            <input type="range" id="speedSlider" min="0" max="0.4" step="0.01" value="0.12">
        </div>

        <button id="playBtn" class="btn">START SIGNAL</button>
        <button id="downloadBtn" class="btn">DOWNLOAD PRO LOOP</button>
    </div>

    <div class="about-box">
        <h2 id="aboutTitle">Deep Sleep Shield</h2>
        <div id="aboutContent">
            Loading zone insights...
        </div>
    </div>

    <div class="badge">100% AD-FREE • OFFLINE OPERATION • PRIVACY FIRST</div>

    <script>
        let audioCtx, biquadFilter, swellGain, masterGain, isPlaying = false, audioBuffer;
        let currentZone = 'sleep';

        const zones = {
            sleep: { title: "Deep Sleep Shield", freq: 350, speed: 0.12, type: "lowpass", content: "<b>Science:</b> Uses a 2nd-order Butterworth filter to roll off frequencies above 350Hz. This mimics the low-frequency weight of a distant ocean, masking household 'startle' noises without alerting the brain.<br><br><b>Tip:</b> Place speaker on a wooden nightstand to naturally resonate the bass." },
            focus: { title: "The 'Brown' Focus Void", freq: 150, speed: 0, type: "lowpass", content: "<b>Science:</b> Deep Brown noise focus. By removing almost all mid and high frequencies, it creates a sensory deprivation effect, ideal for intense coding or reading.<br><br><b>Tip:</b> Best used with over-ear headphones to eliminate ambient chatter." },
            work: { title: "Forest Wind & Pink Noise", freq: 700, speed: 0.05, type: "lowpass", content: "<b>Science:</b> A lighter, 'pinker' spectrum that mimics wind through trees. It maintains enough mid-range frequency to mask keyboard clicks and office hum without being piercing.<br><br><b>Tip:</b> Use at 40% volume for a gentle background layer." },
            active: { title: "Heavy Rain / Energetic Masking", freq: 1200, speed: 0.2, type: "bandpass", content: "<b>Science:</b> A Band-pass filter focused on the rhythmic 'patter' of rain. High energy masking designed to keep you in the zone during chores or exercise.<br><br><b>Tip:</b> Point the speaker toward a wall to diffuse the sound for a wider 'room-fill' effect." }
        };

        function setZone(zoneId, btn) {
            currentZone = zoneId;
            document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const z = zones[zoneId];
            document.getElementById('softnessSlider').value = z.freq;
            document.getElementById('speedSlider').value = z.speed;
            document.getElementById('aboutTitle').innerText = z.title;
            document.getElementById('aboutContent').innerHTML = z.content;

            if (isPlaying) {
                biquadFilter.type = z.type;
                biquadFilter.frequency.setTargetAtTime(z.freq, audioCtx.currentTime, 0.2);
            }
        }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = 2 * audioCtx.sampleRate;
            audioBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = audioBuffer.getChannelData(0);
            let lastOut = 0.0;
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                output[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = output[i];
                output[i] *= 3.5;
            }
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = audioBuffer;
            noiseSource.loop = true;
            
            biquadFilter = audioCtx.createBiquadFilter();
            biquadFilter.type = zones[currentZone].type;
            biquadFilter.frequency.value = document.getElementById('softnessSlider').value;
            
            swellGain = audioCtx.createGain();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.8;

            noiseSource.connect(biquadFilter);
            biquadFilter.connect(swellGain);
            swellGain.connect(masterGain);
            masterGain.connect(audioCtx.destination);
            noiseSource.start();
            updateTide();
        }

        function updateTide() {
            if (!isPlaying) return;
            const now = audioCtx.currentTime;
            const speed = parseFloat(document.getElementById('speedSlider').value);
            if (speed === 0) {
                swellGain.gain.setTargetAtTime(0.8, now, 0.1);
            } else {
                const period = 1 / speed;
                swellGain.gain.cancelScheduledValues(now);
                swellGain.gain.exponentialRampToValueAtTime(0.9, now + (period / 4));
                swellGain.gain.exponentialRampToValueAtTime(0.4, now + (3 * period / 4));
            }
            setTimeout(updateTide, 2000);
        }

        // --- WAV ENCODER ---
        function bufferToWav(abuffer, len) {
            let numOfChan = abuffer.numberOfChannels, length = len * numOfChan * 2 + 44, buffer = new ArrayBuffer(length), view = new DataView(buffer), pos = 0;
            const setUint16 = (d) => { view.setUint16(pos, d, true); pos += 2; };
            const setUint32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
            setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157); setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
            setUint32(abuffer.sampleRate); setUint32(abuffer.sampleRate * 2 * numOfChan); setUint16(numOfChan * 2); setUint16(16);
            setUint32(0x61746164); setUint32(length - pos - 4);
            for(let i=0; i<len; i++) {
                for(let c=0; c<numOfChan; c++) {
                    let s = Math.max(-1, Math.min(1, abuffer.getChannelData(c)[i]));
                    view.setInt16(pos, s < 0 ? s * 32768 : s * 32767, true); pos += 2;
                }
            }
            return new Blob([buffer], {type: "audio/wav"});
        }

        document.getElementById('downloadBtn').onclick = async () => {
            if (!isPlaying) { alert("Start the sound first."); return; }
            const waveSpeed = parseFloat(document.getElementById('speedSlider').value);
            const cycleDuration = waveSpeed > 0 ? (1 / waveSpeed) : 10;
            const numCycles = 10;
            const totalDuration = cycleDuration * numCycles;
            
            document.getElementById('downloadBtn').innerText = "ENCODING 10 CYCLES...";
            document.getElementById('downloadBtn').disabled = true;

            const sr = 44100;
            const offCtx = new OfflineAudioContext(1, sr * totalDuration, sr);
            const src = offCtx.createBufferSource(); src.buffer = audioBuffer; src.loop = true;
            const fil = offCtx.createBiquadFilter(); fil.type = biquadFilter.type; fil.frequency.value = biquadFilter.frequency.value;
            const g = offCtx.createGain();
            g.gain.setValueAtTime(0.4, 0);
            for(let i=0; i<numCycles; i++) {
                let st = i * cycleDuration;
                if(waveSpeed > 0) {
                    g.gain.exponentialRampToValueAtTime(0.9, st + (cycleDuration/4));
                    g.gain.exponentialRampToValueAtTime(0.4, st + (3*cycleDuration/4));
                    g.gain.exponentialRampToValueAtTime(0.4, st + cycleDuration);
                } else { g.gain.setValueAtTime(0.8, st); }
            }
            src.connect(fil); fil.connect(g); g.connect(offCtx.destination); src.start();
            const rendered = await offCtx.startRendering();
            const blob = bufferToWav(rendered, rendered.length);
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `Blunt_${currentZone}_${document.getElementById('softnessSlider').value}Hz.wav`;
            a.click();
            document.getElementById('downloadBtn').innerText = "DOWNLOAD PRO LOOP";
            document.getElementById('downloadBtn').disabled = false;
        };

        document.getElementById('playBtn').addEventListener('click', () => {
            if (!isPlaying) { if (!audioCtx) initAudio(); audioCtx.resume(); isPlaying = true; document.getElementById('playBtn').innerText = "STOP SIGNAL"; }
            else { audioCtx.suspend(); isPlaying = false; document.getElementById('playBtn').innerText = "START SIGNAL"; }
        });
        document.getElementById('softnessSlider').oninput = (e) => { if (isPlaying) biquadFilter.frequency.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.1); };
        
        // Initial text load
        setZone('sleep', document.querySelector('.zone-btn'));
    </script>
</body>
</html>
